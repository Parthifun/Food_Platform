<!DOCTYPE html>
<html>
<head>
    <title>{{ restaurant[2] }}</title>
</head>

<body>

<h1>{{ restaurant[2] }}</h1>

<p>

    {{ restaurant[4] }}

    •

    {{ restaurant[3] }}

    •

    {{ restaurant[5] }}

</p>

<hr>

<h2>Menu</h2>

{% if menu_items %}

    {% for item in menu_items %}

        <div>

            <h3>{{ item[2] }}</h3>

            <p>{{ item[3] }}</p>

            <strong>${{ item[4] }}</strong>

            <br><br>

                <a href="/edit_menu_item/{{ item[0] }}">
                    <button>Edit</button>
                </a>

                <a href="/delete_menu_item/{{ item[0] }}"
                    onclick="return confirm('Are you sure you want to delete this menu item?');">
                    <button>Delete</button>
                </a>

            <br><br>

            <br><br>

        </div>

    {% endfor %}

{% else %}

    <p>No menu items available.</p>

{% endif %}

<hr>

<a href="/edit_restaurant/{{ restaurant[0] }}">
    <button>Edit Restaurant</button>
</a>

<a href="/restaurant/{{ restaurant[0] }}/add_menu_item">
    <button>Add Menu Item</button>
</a>

<br><br>

<a href="/view_restaurants">

    <button>Back</button>

</a>

</body>
</html>
