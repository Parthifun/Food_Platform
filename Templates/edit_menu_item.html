<!DOCTYPE html>
<html>
<head>
    <title>Edit Menu Item</title>
</head>

<body>

<h1>Edit Menu Item</h1>

<form method="POST">

    <label>Item Name</label>
    <br>
    <input
        type="text"
        name="item_name"
        value="{{ menu_item[2] }}"
        required
    >

    <br><br>

    <label>Description</label>
    <br>

    <textarea name="description">{{ menu_item[3] }}</textarea>

    <br><br>

    <label>Price</label>
    <br>

    <input
        type="number"
        step="0.01"
        name="price"
        value="{{ menu_item[4] }}"
        required
    >

    <br><br>

    <label>Category</label>
    <br>

    <input
        type="text"
        name="category"
        value="{{ menu_item[5] }}"
        required
    >

    <br><br>

    <button type="submit">
        Save Changes
    </button>

</form>

<br>

<button onclick="history.back()">
    Cancel
</button>

</body>
</html>
