<!DOCTYPE html>
<html>
<head>
    <title>Edit Restaurant</title>
</head>

<body>

<h1>Edit Restaurant</h1>

<form method="POST">

    <label>Restaurant Name</label>
    <br>
    <input
        type="text"
        name="restaurant_name"
        value="{{ restaurant[2] }}"
        required
    >

    <br><br>

    <label>Phone Number</label>
    <br>
    <input
        type="text"
        name="phone_number"
        value="{{ restaurant[3] }}"
        required
    >

    <br><br>

    <label>Address</label>
    <br>
    <input
        type="text"
        name="address"
        value="{{ restaurant[4] }}"
        required
    >

    <br><br>

    <label>Cuisine Type</label>
    <br>
    <input
        type="text"
        name="cuisine_type"
        value="{{ restaurant[5] }}"
        required
    >

    <br><br>

    <button type="submit">
        Save Changes
    </button>

</form>

<br>

<button onclick="history.back()">
    Cancel
</button>

</body>
</html>
